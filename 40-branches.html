<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>40 Branches of the Veda</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: #0d1117;
  font-family: Georgia, 'Times New Roman', serif;
}
#wrap {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}
#stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 24px 8px;
  overflow: hidden;
  position: relative;
}

/* ── history panel ── */
#history {
  position: absolute;
  top: 10px;
  left: 12px;
  max-width: 200px;
  max-height: calc(100% - 20px);
  overflow-y: auto;
  scrollbar-width: none;
  pointer-events: none;
  text-align: left;
}
#history::-webkit-scrollbar { display: none; }
.h-entry { margin-bottom: 5px; }
.h-name  { font-size: .64rem; color: #5a7090; line-height: 1.3; }
.h-qual  { font-size: .58rem; color: #3d5268; font-style: italic; line-height: 1.3; padding-left: 5px; }

/* ── slides ── */
.slide {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  max-width: 900px;
  width: 100%;
  animation: fi .5s ease;
}
.slide.active { display: flex; }
@keyframes fi {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── text styles ── */
.vedic {
  color: #f5e6c8;
  font-size: clamp(2rem, 6vw, 3.6rem);
  font-weight: bold;
  letter-spacing: .04em;
  line-height: 1.2;
}
.quality {
  color: #7eb8d4;
  font-size: clamp(1.15rem, 3.4vw, 2.1rem);
  font-style: italic;
  line-height: 1.35;
}
.aspect {
  color: #7dc47d;
  font-size: clamp(.92rem, 2.5vw, 1.35rem);
  line-height: 1.5;
  max-width: 740px;
}

/* ── idle prompt ── */
#idle {
  color: #3a4760;
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  letter-spacing: .03em;
}

/* ── audio bar ── */
#bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(10, 14, 20, .97);
  padding: 8px 14px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  border-top: 1px solid #1e2a3a;
}
#playBtn {
  width: 48px;
  height: 48px;
  background: #1e3048;
  border: 1px solid #2a3a50;
  color: #f5e6c8;
  font-size: 1.4rem;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#playBtn:active { background: #2a4060; }
#prog {
  flex: 1;
  accent-color: #7eb8d4;
  cursor: pointer;
  touch-action: none;
  height: 4px;
}
#time-disp {
  color: #44506a;
  font-size: .72rem;
  font-family: monospace;
  white-space: nowrap;
  flex-shrink: 0;
}
#ctr {
  color: #44506a;
  font-size: .78rem;
  font-family: monospace;
  white-space: nowrap;
  min-width: 56px;
  text-align: right;
  flex-shrink: 0;
}

/* ── tap-zone hint overlays ── */
#zone-top, #zone-mid, #zone-bot {
  position: absolute;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  color: rgba(245,230,200,.18);
  font-size: clamp(.9rem, 2.5vw, 1.2rem);
  letter-spacing: .06em;
  transition: opacity .4s;
}
#zone-top { top: 0; height: 33.33%; }
#zone-mid { top: 33.33%; height: 33.34%; }
#zone-bot { top: 66.67%; height: 33.33%; }
</style>
</head>
<body>
<div id="gate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:1000;">
  <div style="text-align:center;color:#f5e6c8;font-family:Georgia,serif;">
    <p style="font-size:1.5rem;margin-bottom:1.2rem;">Enter password to continue</p>
    <input id="pwd" type="password" style="padding:8px 14px;font-size:1.1rem;border:1px solid #3a4760;background:#1a2232;color:#f5e6c8;border-radius:4px;outline:none;" placeholder="Password" autofocus />
    <br><br>
    <button id="enterBtn" style="padding:8px 24px;font-size:1rem;background:#7eb8d4;color:#0d1117;border:none;border-radius:4px;cursor:pointer;">Enter</button>
    <p id="gate-err" style="display:none;color:#e07070;margin-top:1rem;">Incorrect password. Please try again.</p>
  </div>
</div>

<div id="wrap">
  <div id="stage">
    <div id="idle">&#9654;&#xfe0e; Tap centre to play</div>
    <div id="history"></div>
    <div id="zone-top">&#9650; Faster</div>
    <div id="zone-mid">&#9654; Play / Pause</div>
    <div id="zone-bot">&#9660; Slower</div>
  </div>
  <div id="bar">
    <audio id="aud" preload="metadata" src="40-branches.mp3"></audio>
    <button id="playBtn" aria-label="Play / Pause">&#9654;</button>
    <input id="prog" type="range" min="0" step="0.1" value="0" aria-label="Seek">
    <span id="time-disp">0:00</span>
    <span id="ctr"></span>
  </div>
</div>

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function checkPwd() {
  const btn  = document.getElementById('enterBtn');
  const errEl = document.getElementById('gate-err');
  const pwd  = document.getElementById('pwd').value;
  btn.disabled = true;
  btn.textContent = 'Checking…';
  errEl.style.display = 'none';

  try {
    const enc = new TextEncoder();

    // SHA-256 hash check (fast rejection before expensive PBKDF2)
    const hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hashHex !== _H) throw new Error('bad password');

    // Derive AES-256-GCM key via PBKDF2
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64ToArr(_S), iterations: 100000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );

    // Decrypt payload
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64ToArr(_V) },
      key, b64ToArr(_C)
    );

    const payload = JSON.parse(new TextDecoder().decode(plain));

    // Inject slides into stage
    const stage = document.getElementById('stage');
    stage.insertAdjacentHTML('beforeend', payload.html);

    // Hide gate, start app
    document.getElementById('gate').style.display = 'none';
    initApp(payload.times, payload.slideData);

  } catch (e) {
    errEl.style.display = '';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
}

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPwd();
});
document.getElementById('enterBtn').addEventListener('click', checkPwd);

function initApp(TIMES, SLIDE_DATA) {
  const N    = TIMES.length;
  const aud  = document.getElementById('aud');
  const idle = document.getElementById('idle');
  const ctr  = document.getElementById('ctr');
  const hist = document.getElementById('history');
  let cur    = -1;

  function show(idx) {
    if (idx === cur) return;
    if (cur >= 0) document.getElementById('s' + cur).classList.remove('active');
    if (idx < 0) {
      idle.style.display = '';
      ctr.textContent   = '';
      hist.innerHTML    = '';
    } else {
      idle.style.display = 'none';
      document.getElementById('s' + idx).classList.add('active');
      ctr.textContent = (idx + 1) + ' / ' + N;
      hist.innerHTML = SLIDE_DATA.slice(0, idx)
        .map(([n, q]) => '<div class="h-entry"><div class="h-name">' + n + '</div><div class="h-qual">' + q + '</div></div>')
        .join('');
      hist.scrollTop = hist.scrollHeight;
    }
    cur = idx;
  }

  function sync() {
    const t = aud.currentTime;
    let next = -1;
    for (let i = 0; i < TIMES.length; i++) if (t >= TIMES[i]) next = i;
    show(next);
  }

  function forceSync() {
    document.querySelectorAll('.slide.active').forEach(el => el.classList.remove('active'));
    cur = -1;
    idle.style.display = '';
    sync();
  }

  aud.addEventListener('timeupdate', sync);
  aud.addEventListener('seeked',     forceSync);
  aud.addEventListener('ended',      () => show(-1));

  // ── playback speed ─────────────────────────────────────────────────────────
  let speed = 1.0;
  const MIN_SPEED = 0.25, MAX_SPEED = 3.0;

  function setSpeed(s) {
    speed = Math.min(MAX_SPEED, Math.max(MIN_SPEED, Math.round(s * 100) / 100));
    aud.playbackRate = speed;
    showBadge(speed.toFixed(2).replace(/\.?0+$/, '') + '×');
  }

  function showBadge(text) {
    let b = document.getElementById('_badge');
    if (!b) {
      b = document.createElement('div');
      b.id = '_badge';
      b.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);'
        + 'background:rgba(0,0,0,.72);color:#f5e6c8;font-size:1.6rem;padding:12px 28px;'
        + 'border-radius:10px;pointer-events:none;z-index:600;font-family:Georgia,serif;'
        + 'transition:opacity .45s;';
      document.body.appendChild(b);
    }
    b.textContent = text;
    b.style.opacity = '1';
    clearTimeout(b._t);
    b._t = setTimeout(() => b.style.opacity = '0', 1100);
  }

  function showSeekFlash(side) {
    const el = document.createElement('div');
    el.textContent = side === 'left' ? '◀ 10s' : '30s ▶';
    const pos = side === 'left' ? 'left:12%' : 'right:12%';
    el.style.cssText = 'position:fixed;top:50%;' + pos + ';transform:translateY(-50%);'
      + 'background:rgba(0,0,0,.65);color:#f5e6c8;font-size:1.3rem;padding:10px 22px;'
      + 'border-radius:36px;pointer-events:none;opacity:1;transition:opacity .5s;'
      + 'z-index:600;font-family:Georgia,serif;';
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 520); }, 680);
  }

  // ── keyboard shortcuts ──────────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    switch (e.key) {
      case ' ':
        e.preventDefault();
        aud.paused ? aud.play() : aud.pause();
        break;
      case 'ArrowRight':
        e.preventDefault();
        aud.currentTime = Math.min(aud.currentTime + 30, aud.duration || 0);
        showSeekFlash('right');
        break;
      case 'ArrowLeft':
        e.preventDefault();
        aud.currentTime = Math.max(aud.currentTime - 10, 0);
        showSeekFlash('left');
        break;
      case 'f': case 'F':
        e.preventDefault();
        setSpeed(speed + 0.25);
        break;
      case 's': case 'S':
        e.preventDefault();
        setSpeed(speed - 0.25);
        break;
    }
  });

  // ── custom bottom controls ────────────────────────────────────────────────────
  const playBtn  = document.getElementById('playBtn');
  const prog     = document.getElementById('prog');
  const timeDisp = document.getElementById('time-disp');

  function fmtTime(s) {
    s = Math.round(s || 0);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function updateBar() {
    playBtn.innerHTML = aud.paused ? '&#9654;' : '&#9646;&#9646;';
    if (aud.duration) {
      prog.max   = aud.duration;
      prog.value = aud.currentTime;
    }
    timeDisp.textContent = fmtTime(aud.currentTime) + ' / ' + fmtTime(aud.duration);
  }

  playBtn.addEventListener('click', () => aud.paused ? aud.play() : aud.pause());
  prog.addEventListener('input', () => { aud.currentTime = parseFloat(prog.value); });
  aud.addEventListener('play',       updateBar);
  aud.addEventListener('pause',      updateBar);
  aud.addEventListener('ended',      updateBar);
  aud.addEventListener('timeupdate', updateBar);
  aud.addEventListener('loadedmetadata', updateBar);

  // ── tap zones: top third = faster, middle = play/pause, bottom = slower ──────
  const zoneTop = document.getElementById('zone-top');
  const zoneMid = document.getElementById('zone-mid');
  const zoneBot = document.getElementById('zone-bot');

  function flashZone(el) {
    el.style.opacity = '1';
    clearTimeout(el._zt);
    el._zt = setTimeout(() => { el.style.opacity = '0'; }, 700);
  }

  document.getElementById('stage').addEventListener('click', function(e) {
    const rect   = this.getBoundingClientRect();
    const relY   = (e.clientY - rect.top) / rect.height;
    if (relY < 0.333) {
      setSpeed(speed + 0.25);
      flashZone(zoneTop);
    } else if (relY < 0.667) {
      aud.paused ? aud.play() : aud.pause();
      flashZone(zoneMid);
    } else {
      setSpeed(speed - 0.25);
      flashZone(zoneBot);
    }
  });
}
</script>
